name: Generate Changelog from History

on:
  workflow_dispatch:

jobs:
  generate-history-changelog:
    runs-on: ubuntu-latest
    # Required for GITHUB_TOKEN to push changes
    permissions:
      contents: write

    steps:
      - name: Checkout master branch
        uses: actions/checkout@v3
        with:
          ref: master
          # Using default GITHUB_TOKEN
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyGithub GitPython

      - name: Generate changelog from history
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python tools/changelog/generate_cl_from_history.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "Historical changelog rebuild [ci skip]"
          git push
