name: Generate Changelog

on:
  push:
    branches:
      - master
      - changelog-fixes
      - testmerge

  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to run changelog for (e.g. master or testmerge)"
        required: true
        default: "master"
      reason:
        description: "Why are you manually generating the changelog?"
        required: false
        default: "Manual trigger"

jobs:
  generate-changelog:
    runs-on: ubuntu-latest

    environment:
      name: BOT_TOKEN

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.ref }}
          token: ${{ secrets.BOT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r tools/changelog/requirements.txt

      - name: Generate changelog yml from all merged PRs
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          BASE="${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.ref_name }}"
          echo "Generating changelog for branch: $BASE"
          python tools/changelog/generate_cl.py --all --base master

      - name: Compile HTML changelog (merge yml into cache, then build from html/changelogs/.all_changelog.yml)
        run: python tools/changelog/ss13_genchangelog.py html/changelog.html html/changelogs/autochangelogs

      - name: Commit and push changelog
        run: |
          git config user.name "${{ secrets.BOT_NAME }}"
          git config user.email "${{ secrets.BOT_EMAIL }}"
          git add html/changelog.html html/changelogs/
          git diff --staged --quiet || git commit -m "Automatic changelog compile [ci skip]"
          git push
