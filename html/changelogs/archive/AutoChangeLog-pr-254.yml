author: AMcilraith
changes:
  - add: Introduced the "SST Resolute" handgun, a new weapon for CBOs with 
      selectable fire modes for non-lethal and lethal ammunition.
  - del: Removed the Malpractice handgun from the game.
  - tweak: Updated descriptions and names of certain spacesuit control modules, 
      enhancing the thematic consistency of the suits.
  - fix: Adjusted the recoil values on the "Format Bound" handgun for improved 
      handling.
date: '2025-09-25'
delete-after: false
