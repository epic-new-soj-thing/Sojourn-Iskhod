author: AMcilraith
changes:
  - add: Introduced new PG-7V-L rocket with laser-guided targeting for RPG-7 
      launcher.
  - add: Added PG-7V-S laser-guided shrapnel rocket and PG-7V-AT HEAT rocket 
      with armor-piercing capabilities.
  - add: New variant of grenade shell, the xenofauna energy net shell, designed 
      to deploy an energy net.
  - add: Crafted designs for new weapons including enhanced rockets and grenade 
      varieties available at fabricators.
  - tweak: Updated the energy net item to include a new "animal net" variant 
      specifically for capturing creatures.
date: '2025-08-08'
delete-after: false
