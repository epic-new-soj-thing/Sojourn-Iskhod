author: AMcilraith
changes:
  - add: Players can now reveal blood traces using luminol, which fluoresce 
      under certain conditions.
  - tweak: Energy resistance of militia ablative gloves has been increased to 
      improve protection.
  - tweak: Energy resistance of ablative jackboots has been increased to enhance
      player survivability.
  - fix: Removed unnecessary perk from human species definition, allowing a 
      cleaner character customization experience.
  - balance: Adjusted various weapon projectiles' damage and recoil values for 
      improved combat experience.
date: '2025-08-27'
delete-after: false
