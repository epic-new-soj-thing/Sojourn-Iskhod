author: AMcilraith
changes:
  - add: Introduced new Deimos weapons including "Panah," "Tombak," "Palu," 
      "Parang," "Golok," "Celurit," and "Keris."
  - add: Added new ammo types including 8x16mm, 10x24mm, and 12x64mm Caseless 
      magazines.
  - add: Added the "Mild Revival Sickness" perk which modifies player stats 
      post-revival.
  - tweak: Altered functionalities and descriptions of existing weapons and ammo
      in autolathe.
  - fix: Resolved issues related to medical items and scanners in autolathe.
